name: OmniLibrary CI/CD

on:
  push:
    branches: [ "main", "stag" ]
  pull_request:
    branches: [ "main", "stag" ]

jobs:
  # --- TAHAP 1: QUALITY CONTROL (Unit Testing) ---
  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25' # Sesuaikan dengan versi di Dockerfile-mu

      - name: Run Tests
        # Robot menjalankan perintah test yang biasa kamu jalankan di lokal
        run: go test -v ./internal/usecase/... ./internal/utils/...

  # --- TAHAP 2: PENGEPAKAN (Build & Push to Docker Hub) ---
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # HANYA JALAN JIKA TAHAP TEST LULUS (HIJAU)
    if: github.event_name == 'push' # Hanya build jika terjadi PUSH asli, bukan sekadar PR
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        # Logika sederhana: Jika push ke main tagnya 'latest', jika ke stag tagnya 'staging'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ganti 'username_kamu' dengan username asli Docker Hub-mu
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/omni-api:${{ env.IMAGE_TAG }}