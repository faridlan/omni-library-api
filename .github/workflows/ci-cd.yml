name: OmniLibrary CI/CD

on:
  push:
    branches: [ "main", "stag" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "stag" ]

jobs:
  test:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Tests
        run: go test -v ./internal/usecase/... ./internal/utils/...

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Mengambil v1.0.0 menjadi 1.0.0
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/omni-api:${{ env.IMAGE_TAG }}

  deploy-staging:
    name: Deploy to Azure Staging
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/stag'
    
    steps:
      - name: Deploy Services via Docker Compose
        run: |
            echo "Memasuki ruang Staging..."
            cd /home/nullhakim/apps/omnilibrary/stag
            
            echo "Menarik image terbaru dari Docker Hub..."
            sudo docker compose pull
            
            echo "Me-restart container Staging..."
            sudo docker compose up -d
            
            echo "Deployment Staging Selesai! 🚀"
  deploy-production:
    name: Deploy to Azure Production
    runs-on: self-hosted
    needs: build-and-push
    # PENTING: Job ini HANYA tereksekusi jika push berupa Tag (misal: v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Deploy Services via Docker Compose
        run: |
          echo "🚀 Memasuki ruang Production..."
          # Pastikan path ini sudah sesuai dengan struktur rapi yang baru kita buat
          cd /home/nullhakim/apps/omnilibrary/prod
          
          echo "📦 Mengekstrak versi dari Git Tag..."
          # Variabel $GITHUB_REF otomatis tersedia di dalam environment GitHub Runner
          # Menghapus kata 'refs/tags/v' sehingga 'v1.0.0' menjadi '1.0.0'
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Versi yang akan di-deploy: $VERSION"
          
          echo "📝 Menulis versi ke file .env.version untuk Docker Compose..."
          echo "API_VERSION=$VERSION" > .env.version
          
          echo "⬇️ Menarik image versi $VERSION dari Docker Hub..."
          # Menjalankan compose dengan menggabungkan .env asli dan .env.version
          sudo docker compose --env-file .env --env-file .env.version pull
          
          echo "🔄 Me-restart container Production..."
          sudo docker compose --env-file .env --env-file .env.version up -d
          
          echo "✅ Deployment Production Selesai!"