host: localhost:8080
info:
  contact: {}
  description: Ini adalah dokumentasi API untuk MVP OmniLibrary.
  title: OmniLibrary API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Autentikasi email dan password pengguna untuk mendapatkan Token
        JWT.
      parameters:
      - description: Payload kredensial login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login berhasil, berisi access_token dan refresh_token
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_delivery_http_dto_TokenResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "401":
          description: Email atau Password salah
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "404":
          description: Email tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      summary: Login User (Dapatkan JWT)
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Menukarkan Refresh Token lama (berumur 7 hari) dengan Access Token
        baru (15 menit). Cocok dipanggil diam-diam oleh Frontend saat mendapat error
        401.
      parameters:
      - description: Payload Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mendapat access token baru
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_delivery_http_dto_TokenResponse'
        "400":
          description: Format salah atau token tidak valid
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "401":
          description: Token expired atau ditolak
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      summary: Perbarui Access Token
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Mendaftarkan pengguna baru ke dalam sistem dan melakukan hashing
        pada password.
      parameters:
      - description: Payload registrasi pengguna baru
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User berhasil dibuat
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_delivery_http_dto_UserResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "409":
          description: Email sudah terdaftar (Conflict)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      summary: Registrasi User Baru
      tags:
      - Auth
  /api/books:
    get:
      description: Mengambil daftar buku dari database secara terpaginasi (pagination)
      parameters:
      - description: 'Nomor Halaman (Default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah Data per Halaman (Default: 10)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil katalog buku
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.PaginatedResponse-github_com_faridlan_omni-library-api_internal_domain_Book'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      summary: Ambil Katalog Buku
      tags:
      - Books
  /api/books/{id}:
    delete:
      description: Menghapus buku dari database master secara permanen
      parameters:
      - description: ID Buku
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Buku berhasil dihapus dari sistem
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_utils_EmptyObj'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Hapus Buku (Admin Only)
      tags:
      - Books
    get:
      description: Mengambil detail buku berdasarkan ID yang diberikan
      parameters:
      - description: ID Buku
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Buku ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_domain_Book'
        "404":
          description: Buku tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      summary: Ambil Buku Berdasarkan ID
      tags:
      - Books
    put:
      consumes:
      - application/json
      description: Mengedit metadata buku master (judul, cover, dll)
      parameters:
      - description: ID Buku
        in: path
        name: id
        required: true
        type: string
      - description: Payload data update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.BookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Metadata buku berhasil diperbarui
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_domain_Book'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update Data Buku (Admin Only)
      tags:
      - Books
  /api/books/fetch:
    post:
      consumes:
      - application/json
      description: Mencari buku di Google Books via ISBN dan menyimpannya ke database
        lokal
      parameters:
      - description: Payload berisi ISBN
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.FetchBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Metadata buku berhasil diambil
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_domain_Book'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "404":
          description: Buku tidak ditemukan di Google Books
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ambil & Simpan Metadata Buku
      tags:
      - Books
  /api/books/manual:
    post:
      consumes:
      - application/json
      description: Menambahkan buku lokal tanpa ISBN ke database master
      parameters:
      - description: Payload data buku
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.BookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Buku berhasil ditambahkan
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_domain_Book'
        "401":
          description: Unauthorized (Tidak bawa Token)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "403":
          description: Forbidden (Bukan Admin)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tambah Buku Manual (Admin Only)
      tags:
      - Books
  /api/library:
    get:
      description: Menampilkan seluruh buku yang ada di rak personal user, lengkap
        dengan metadata bukunya. Bisa difilter berdasarkan status.
      parameters:
      - description: 'Nomor Halaman (Default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah Data per Halaman (Default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Filter status: TO_READ, READING, FINISHED'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil buku dari rak
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.PaginatedResponse-github_com_faridlan_omni-library-api_internal_domain_UserBookWithMetadata'
        "401":
          description: Unauthorized (Token tidak ada/salah)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "404":
          description: Rak buku tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Lihat Isi Rak Buku
      tags:
      - Library
    post:
      consumes:
      - application/json
      description: 'Memasukkan buku dari database master ke dalam rak bacaan personal
        user (Default: TO_READ)'
      parameters:
      - description: Payload berisi ID Buku
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_delivery_http_dto.AddBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Buku berhasil ditambahkan ke rak
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.SuccessResponse-github_com_faridlan_omni-library-api_internal_domain_UserBook'
        "400":
          description: Format JSON salah
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "401":
          description: Unauthorized (Token tidak ada/salah)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "409":
          description: Buku sudah ada di rak (Conflict)
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
        "500":
          description: Gagal menyimpan buku ke rak
          schema:
            $ref: '#/definitions/github_com_faridlan_omni-library-api_internal_utils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Tambah Buku ke Rak
      tags:
      - Library
  /api/library/{book_id}:
    delete:
      description: Menghapus buku dari rak personal user
      parameters:
